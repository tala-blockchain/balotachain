[package]
name = "tala-ffi-flutter"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Tala: Rust -> Dart FFI bridge for the BalotaChain voter app, via flutter_rust_bridge. Exposes tala-crypto, tala-credentials, and tala-protocol to the Flutter mobile client."

[lib]
name = "tala_ffi_flutter"
path = "src/lib.rs"
crate-type = ["staticlib", "cdylib", "rlib"]

[features]
default = []
frb = []

[dependencies]
tala-crypto = { path = "../tala-crypto" }
tala-credentials = { path = "../tala-credentials" }
tala-protocol = { path = "../tala-protocol/rust" }
curve25519-dalek.workspace = true
serde = { version = "1", features = ["derive", "std"] }
sha2 = "0.10"
