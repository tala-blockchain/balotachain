[package]
name = "tala-ffi-tauri"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Tala: Rust -> TypeScript bridge via Tauri commands for the trustee, admin, and auditor desktop apps. Exposes tala-crypto, tala-credentials, and tala-protocol to the desktop clients."

[lib]
name = "tala_ffi_tauri"
path = "src/lib.rs"

[features]
default = []
tauri = []

[dependencies]
tala-crypto = { path = "../tala-crypto" }
tala-credentials = { path = "../tala-credentials" }
tala-protocol = { path = "../tala-protocol/rust" }
curve25519-dalek.workspace = true
serde = { version = "1", features = ["derive", "std"] }
sha2 = "0.10"
