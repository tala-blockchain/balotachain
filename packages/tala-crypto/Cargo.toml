[package]
name = "tala-crypto"
description = "Placeholder crate for Tala cryptographic primitives."
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
curve25519-dalek = { version = "4", features = ["digest", "rand_core", "serde"] }
merlin = "3"
rand_core = "0.6"
serde = { version = "1", features = ["derive"] }
subtle = "2"
thiserror = "1"
zeroize = { version = "1", features = ["zeroize_derive"] }

[dev-dependencies]
proptest = "1"

[lints]
workspace = true

