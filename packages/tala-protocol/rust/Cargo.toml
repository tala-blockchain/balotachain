[package]
name = "tala-protocol"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Tala: canonical wire types and serialization shared by the Rust crypto stack and the Go Fabric chaincode. Schema in ../proto/tala/protocol/v1/wire.proto."
build = "build.rs"

[lib]
name = "tala_protocol"
path = "src/lib.rs"

[dependencies]
prost = "0.13"
serde.workspace = true
sha2 = { version = "0.10", default-features = false }
thiserror.workspace = true

[build-dependencies]
prost-build = "0.13"
protoc-bin-vendored = "3"
