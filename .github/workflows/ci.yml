name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  GO_MODULES: |
    packages/tala-protocol/go
    packages/tala-bulletin/chaincode
    packages/tala-bulletin/client-sdk
  # Allow Go to fetch and write missing go.sum entries during CI. The repo
  # is in early scaffold and not all modules have committed go.sum yet.
  GOFLAGS: -mod=mod

jobs:
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint TypeScript and JavaScript
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy,rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: |
            packages/tala-protocol/go/go.mod
            packages/tala-bulletin/chaincode/go.mod
            packages/tala-bulletin/client-sdk/go.mod

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Lint Go modules
        shell: bash
        run: |
          set -euo pipefail
          for module in ${GO_MODULES}; do
            files="$(gofmt -l "${module}")"
            if [ -n "${files}" ]; then
              echo "${files}"
              exit 1
            fi
            (cd "${module}" && go vet ./...)
            (cd "${module}" && "$(go env GOPATH)/bin/staticcheck" ./...)
          done

  typecheck:
    name: Typecheck (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck TypeScript workspaces
        run: pnpm typecheck

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Test TypeScript workspaces
        run: pnpm test

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Test Rust workspace
        run: cargo test --workspace

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: |
            packages/tala-protocol/go/go.mod
            packages/tala-bulletin/chaincode/go.mod
            packages/tala-bulletin/client-sdk/go.mod

      - name: Test Go modules
        shell: bash
        run: |
          set -euo pipefail
          for module in ${GO_MODULES}; do
            (cd "${module}" && go test ./...)
          done

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript workspaces
        run: pnpm build

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build Rust workspace
        run: cargo build --workspace --release

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: |
            packages/tala-protocol/go/go.mod
            packages/tala-bulletin/chaincode/go.mod
            packages/tala-bulletin/client-sdk/go.mod

      - name: Build Go modules
        shell: bash
        run: |
          set -euo pipefail
          for module in ${GO_MODULES}; do
            (cd "${module}" && go build ./...)
          done

  security:
    name: Security (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit Node dependencies
        run: pnpm audit --audit-level moderate

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Audit Rust dependencies
        run: cargo audit

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: |
            packages/tala-protocol/go/go.mod
            packages/tala-bulletin/chaincode/go.mod
            packages/tala-bulletin/client-sdk/go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        shell: bash
        run: |
          set -euo pipefail
          for module in ${GO_MODULES}; do
            (cd "${module}" && "$(go env GOPATH)/bin/govulncheck" ./...)
          done
