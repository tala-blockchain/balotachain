name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm through Corepack
        run: corepack enable

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/Library/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('package.json', 'pnpm-workspace.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install TypeScript dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Run Prettier check
        run: pnpm format:check

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy,rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/tala-bulletin/go.mod
          cache: true
          cache-dependency-path: packages/tala-bulletin/go.mod

      - name: Check Go formatting
        run: test -z "$(gofmt -l packages/tala-bulletin)"

      - name: Run go vet
        working-directory: packages/tala-bulletin
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        working-directory: packages/tala-bulletin
        run: staticcheck ./...

  typecheck:
    name: Typecheck (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm through Corepack
        run: corepack enable

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/Library/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('package.json', 'pnpm-workspace.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install TypeScript dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run TypeScript typecheck
        run: pnpm typecheck

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm through Corepack
        run: corepack enable

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/Library/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('package.json', 'pnpm-workspace.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install TypeScript dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run TypeScript tests
        run: pnpm test

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Rust tests
        run: cargo test --workspace

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/tala-bulletin/go.mod
          cache: true
          cache-dependency-path: packages/tala-bulletin/go.mod

      - name: Run Go tests
        working-directory: packages/tala-bulletin
        run: go test ./...

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm through Corepack
        run: corepack enable

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/Library/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('package.json', 'pnpm-workspace.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install TypeScript dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build TypeScript workspace
        run: pnpm build

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build Rust workspace
        run: cargo build --workspace --release

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/tala-bulletin/go.mod
          cache: true
          cache-dependency-path: packages/tala-bulletin/go.mod

      - name: Build Go packages
        working-directory: packages/tala-bulletin
        run: go build ./...

  security:
    name: Security (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm through Corepack
        run: corepack enable

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/pnpm/store
            ~/Library/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('package.json', 'pnpm-workspace.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install TypeScript dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Audit TypeScript dependencies
        run: pnpm audit --audit-level moderate

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Audit Rust dependencies
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/tala-bulletin/go.mod
          cache: true
          cache-dependency-path: packages/tala-bulletin/go.mod

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-package: ./packages/tala-bulletin/...

